requirements_task:
  description: >
    Analyse the following raw requirements and produce a refined requirements specification.
    Identify: functional requirements, non-functional requirements, constraints, and edge cases.
    Resolve ambiguities and produce a document the engineering lead can use directly.
    Raw requirements: {requirements}
  expected_output: >
    A structured requirements specification in markdown covering functional requirements,
    non-functional requirements, constraints, and edge cases. Clear and unambiguous.
  agent: business_analyst
  output_file: output/requirements_spec.md


design_task:
  description: >
    Using the refined requirements specification, design a complete multi-module Python system.
    Identify all necessary modules (one file per concern), their classes, key methods,
    and inter-module dependencies. Every module should be independently testable.
    Output a valid JSON object matching the SystemDesign schema:
    {{
      "system_overview": "...",
      "modules": [
        {{
          "module_name": "foo.py",
          "class_name": "Foo",
          "description": "...",
          "key_methods": ["method_one(self, arg) -> ReturnType", "..."],
          "dependencies": []
        }}
      ]
    }}
    IMPORTANT: Output ONLY the raw JSON object — no markdown, no code fences, no extra text.
  expected_output: >
    A raw JSON object matching the SystemDesign schema, listing all modules with their
    class names, descriptions, key methods, and dependencies.
  agent: engineering_lead
  context:
    - requirements_task
